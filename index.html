<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEVEN Chat</title>
<style>
  :root {
    --bg: #0f0f14;
    --sidebar: #14141f;
    --chat-bg: #1a1a28;
    --user-bubble: #3b82f6;
    --ai-bubble: #252540;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #2d2d44;
    --input-bg: #1e1e30;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #22c55e;
    --danger: #ef4444;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .sidebar-status {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  .status-dot.disconnected {
    background: var(--danger);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .sidebar-actions {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn {
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover {
    background: var(--border);
  }

  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn.accent:hover {
    background: var(--accent-hover);
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
  }

  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--chat-bg);
  }

  .chat-header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: white;
  }

  .chat-header .info h3 {
    font-size: 15px;
    font-weight: 600;
  }

  .chat-header .info span {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--bg);
  }

  .messages::-webkit-scrollbar {
    width: 6px;
  }

  .messages::-webkit-scrollbar-track {
    background: transparent;
  }

  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
  }

  .msg.user .msg-avatar {
    background: var(--user-bubble);
    color: white;
  }

  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: white;
  }

  .msg-content {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-content {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.ai .msg-content {
    background: var(--ai-bubble);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg.ai .msg-content code {
    background: #2d2d44;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
  }

  .msg.ai .msg-content pre {
    background: #1a1a2e;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border);
  }

  .msg.ai .msg-content pre code {
    background: none;
    padding: 0;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
  }

  .typing span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: bounce 1.4s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* Input area */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--chat-bg);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-area textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 150px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area textarea:focus {
    border-color: var(--accent);
  }

  .input-area textarea::placeholder {
    color: var(--text-secondary);
  }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: var(--accent-hover);
    transform: scale(1.05);
  }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
    margin: auto;
  }

  .welcome .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .welcome h2 {
    font-size: 24px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 14px;
    max-width: 400px;
    line-height: 1.6;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>ELEVEN</h1>
    <p class="subtitle">AI Assistant · Hermes Agent</p>
  </div>
  <div class="sidebar-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connected</span>
  </div>
  <div class="sidebar-actions">
    <button class="btn" onclick="newChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>
    <button class="btn" onclick="reconnect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
      Reconnect
    </button>
  </div>
  <div class="sidebar-footer">
    Connected to local Hermes Agent<br>
    WSL · DeepSeek v4 Pro
  </div>
</aside>

<!-- Main Chat -->
<main class="main">
  <div class="chat-header">
    <div class="avatar">11</div>
    <div class="info">
      <h3>ELEVEN</h3>
      <span>Hermes AI Agent</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">⚡</div>
      <h2>Hello! I'm ELEVEN</h2>
      <p>Your AI assistant powered by Hermes Agent. Ask me anything — I can help with code, research, file management, and more.</p>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="userInput"
      placeholder="Message ELEVEN..."
      rows="1"
      onkeydown="handleKeyDown(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</main>

<script>
const messagesDiv = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
let isWaiting = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(text, role) {
  // Remove welcome
  const welcome = messagesDiv.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'You' : '11';

  const content = document.createElement('div');
  content.className = 'msg-content';
  content.textContent = text;

  div.appendChild(avatar);
  div.appendChild(content);
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return content;
}

function showTyping() {
  const welcome = messagesDiv.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingMsg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '11';

  const content = document.createElement('div');
  content.className = 'msg-content';
  content.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(content);
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function hideTyping() {
  const typing = document.getElementById('typingMsg');
  if (typing) typing.remove();
}

async function sendMessage() {
  if (isWaiting) return;
  const message = userInput.value.trim();
  if (!message) return;

  isWaiting = true;
  sendBtn.disabled = true;
  userInput.disabled = true;
  addMessage(message, 'user');
  userInput.value = '';
  userInput.style.height = 'auto';
  showTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    hideTyping();
    const data = await resp.json();

    if (data.error) {
      addMessage('Error: ' + data.error, 'ai');
    } else if (data.message) {
      addMessage(data.message, 'ai');
    }

  } catch (err) {
    hideTyping();
    addMessage('Connection error. Is the server running?', 'ai');
    updateStatus(false);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

async function checkStatus() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    updateStatus(data.status === 'ok');
  } catch {
    updateStatus(false);
  }
}

function updateStatus(connected) {
  if (connected) {
    statusDot.className = 'status-dot';
    statusText.textContent = 'Connected';
  } else {
    statusDot.className = 'status-dot disconnected';
    statusText.textContent = 'Disconnected';
  }
}

async function reconnect() {
  try {
    statusText.textContent = 'Restarting...';
    const resp = await fetch('/api/restart', { method: 'POST' });
    const data = await resp.json();
    updateStatus(data.status === 'restarted');
    addMessage('✓ New session started.', 'ai');
  } catch {
    updateStatus(false);
  }
}

function newChat() {
  messagesDiv.innerHTML = `
    <div class="welcome">
      <div class="icon">⚡</div>
      <h2>Hello! I'm ELEVEN</h2>
      <p>Your AI assistant powered by Hermes Agent. Ask me anything.</p>
    </div>`;
  reconnect();
}

// Periodic status check
setInterval(checkStatus, 10000);
checkStatus();

// Focus on load
userInput.focus();
</script>

</body>
</html>
